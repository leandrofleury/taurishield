application:
  name: Portainer
  identifier: br.com.taurishield.portainer
  version: 1.0.0

source:
  url: https://portainer.internal.example.com

security:
  profile: strict
  csp: strict
  permissions:
    notifications: false
    clipboard: false
    downloads: false
    shell: false
    filesystem: false
    camera: false
    microphone: false
    geolocation: false

allowlist:
  domains:
    - portainer.internal.example.com
