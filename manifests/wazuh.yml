application:
  name: Wazuh Dashboard
  identifier: br.com.taurishield.wazuh
  version: 1.0.0

source:
  url: https://wazuh.internal.example.com

security:
  profile: kiosk
  csp: strict
  permissions:
    notifications: false
    clipboard: false
    downloads: false
    shell: false
    filesystem: false
    camera: false
    microphone: false
    geolocation: false

allowlist:
  domains:
    - wazuh.internal.example.com
