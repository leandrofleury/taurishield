[graph]
all-features = true

[advisories]
version = 2
yanked = "warn"
ignore = []

[licenses]
version = 2
confidence-threshold = 0.93

allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib"
]

exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"

allow-registry = [
    "https://github.com/rust-lang/crates.io-index"
]

allow-git = []