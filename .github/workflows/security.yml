name: Security Checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  rust-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace

      - name: Validate example manifests
        run: |
          for manifest in manifests/*.yml; do
            cargo run -p taurishield -- validate "$manifest"
          done

      - name: Audit example manifests
        run: |
          for manifest in manifests/*.yml; do
            cargo run -p taurishield -- audit "$manifest"
          done

      - name: Generate JSON audit report
        run: cargo run -p taurishield -- report manifests/chatgpt.yml --output taurishield-report.json

      - name: Generate SARIF report
        run: cargo run -p taurishield -- sarif manifests/chatgpt.yml --output taurishield.sarif

      - name: Generate release evidence
        run: cargo run -p taurishield -- release-check manifests/chatgpt.yml --output dist

      - name: Upload pipeline evidence
        uses: actions/upload-artifact@v4
        with:
          name: taurishield-pipeline-evidence
          path: |
            taurishield-report.json
            taurishield.sarif
            dist/chatgpt/release-evidence/**

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Cargo audit
        run: cargo audit

      - name: Cargo deny
        run: cargo deny check

  sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Generate SBOM
        run: |
          mkdir -p sbom
          cargo cyclonedx --format json --override-filename taurishield
          find crates -name "taurishield.cdx.json" -exec cp --parents {} sbom/ \;

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: taurishield-sbom
          path: sbom/crates/**/taurishield.cdx.json
